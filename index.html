<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashPrice - Kaiwara Hub Edition</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <!-- Main Content Wrapper -->
    <div class="max-w-xl mx-auto mt-12 p-4 w-full mb-16">
        
        <!-- Header Section -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-600 flex items-center justify-center gap-2">
                ⚡ FlashPrice
            </h1>
            <p class="text-sm text-slate-500 mt-1">Compare Blinkit, Zepto, and Instamart prices in real-time</p>
            <span class="mt-2 inline-block bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-0.5 rounded">
                Kaiwara Hub Monitor Active
            </span>
        </div>

        <!-- Form Card -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-4">
            <div>
                <input type="text" id="itemInput" value="nandini milk" placeholder="Enter item name..." 
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="flex gap-2">
                <input type="text" id="pincodeInput" value="560104" placeholder="Pincode" 
                    class="w-1/2 px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                
                <select id="quantitySelect" class="w-1/2 px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="1 Litre">1 Litre</option>
                    <option value="1 kg">1 kg</option>
                    <option value="500g">500g</option>
                </select>
            </div>

            <button onclick="simulateSearch()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-md">
                Find Cheapest Price
            </button>
        </div>

        <!-- Dynamic Output Layout (Simulated Backend) -->
        <div id="resultsLayout" class="mt-8 flex flex-col gap-4">
            <!-- JavaScript will insert the cards directly here on click -->
        </div>

    </div>

    <!-- Footer Block -->
    <footer class="w-full text-center py-5 border-t border-slate-200 bg-white text-sm text-slate-400 mt-auto">
        Designed & Engineered by <span class="font-semibold text-slate-600">Santhosh S</span>
    </footer>

    <!-- Hardcoded Instant Execution Logic -->
    <script>
        function simulateSearch() {
            const item = document.getElementById('itemInput').value || 'Item';
            const resultsLayout = document.getElementById('resultsLayout');
            
            // Instantly render a beautiful static results comparison card
            resultsLayout.innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-green-500 animate-fadeIn">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-lg font-bold text-slate-700 capitalize">📍 Results for "${item}"</h3>
                        <span class="bg-green-100 text-green-800 text-xs font-medium px-2 py-0.5 rounded">Cheapest Found</span>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 text-center mt-4">
                        <div class="p-3 bg-slate-50 rounded-xl border border-indigo-100 ring-2 ring-indigo-500">
                            <p class="text-xs text-indigo-600 font-bold">Zepto</p>
                            <p class="text-xl font-extrabold text-slate-800 mt-1">₹41</p>
                            <p class="text-[10px] text-green-600 mt-0.5">⏱ 9 Mins</p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                            <p class="text-xs text-slate-500 font-semibold">Blinkit</p>
                            <p class="text-xl font-bold text-slate-700 mt-1">₹43</p>
                            <p class="text-[10px] text-slate-400 mt-0.5">⏱ 12 Mins</p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                            <p class="text-xs text-slate-500 font-semibold">Instamart</p>
                            <p class="text-xl font-bold text-slate-700 mt-1">₹45</p>
                            <p class="text-[10px] text-slate-400 mt-0.5">⏱ 15 Mins</p>
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-3 border-t border-slate-100 text-xs text-slate-400 flex justify-between">
                        <span>Delivery Loop: Kaiwara Hub</span>
                        <span class="text-green-600 font-medium">✓ Metrics tracked via Prometheus</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
