<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashPrice - Compare Quick Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <!-- Main Content Wrapper Container -->
    <div class="max-w-xl mx-auto mt-12 p-4 w-full mb-16">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-600 tracking-tight">⚡ FlashPrice</h1>
            <p class="text-slate-500 text-sm">Compare Blinkit, Zepto, and Instamart prices in real-time</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-3">
            <input id="itemQuery" type="text" placeholder="What are you buying? (e.g., Amul Butter, Nandini, Kurkure)" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-400">
            
            <div class="grid grid-cols-2 gap-3">
                <input id="pincodeQuery" type="number" placeholder="Pincode (e.g., 560104)" min="100000" max="999999" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-400">

                <select id="quantityQuery" class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <option value="">Any Size / Pack</option>
                    <option value="100g">100g</option>
                    <option value="200g">200g</option>
                    <option value="250g">250g</option>
                    <option value="500g">500g</option>
                    <option value="1kg">1 kg</option>
                    <option value="1l">1 Litre</option>
                    <option value="250ml">250 ml</option>
                    <option value="750ml">750 ml</option>
                </select>
            </div>

            <button onclick="runComparison()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition">
                Find Cheapest Price
            </button>
        </div>

        <div id="loadingIndicator" class="hidden text-center mt-8 text-indigo-600 font-semibold animate-pulse">Searching grocery dark stores...</div>
        <div id="resultsLayout" class="mt-8 flex flex-col gap-4"></div>
    </div>

    <!-- Streamlined Professional Developer Footer -->
    <footer class="w-full text-center py-5 border-t border-slate-200 bg-white text-sm text-slate-500 mt-auto">
        <div class="max-w-xl mx-auto px-4 flex items-center justify-center gap-3">
            <img src="Santhosh.JPG" alt="Santhosh S" class="w-9 h-9 rounded-full border border-indigo-200 object-cover shadow-sm">
            <p class="text-slate-600 font-medium">Designed & Engineered by <span class="font-bold text-slate-900">Santhosh S</span></p>
        </div>
    </footer>

    <script>
        async function runComparison() {
            const item = document.getElementById('itemQuery').value.trim();
            const pincode = document.getElementById('pincodeQuery').value.trim();
            const quantity = document.getElementById('quantityQuery').value;
            const loader = document.getElementById('loadingIndicator');
            const container = document.getElementById('resultsLayout');

            if (!item) return alert("Please type a product name first!");
            if (!pincode) return alert("Please enter your 6-digit delivery pincode!");
            if (pincode.length !== 6) return alert("Please enter a valid 6-digit Indian delivery pincode.");

            loader.classList.remove('hidden');
            container.innerHTML = '';

            try {
                const url = `http://3.111.31.240:5000/api/compare?item=${encodeURIComponent(item)}&pincode=${encodeURIComponent(pincode)}&quantity=${encodeURIComponent(quantity)}`;
                console.log("Fetching from:", url);

                const res = await fetch(url);
                const data = await res.json();
                
                loader.classList.add('hidden');

                if (data.error) {
                    container.innerHTML = `<div class="text-center text-red-500 font-medium">${data.error}</div>`;
                    return;
                }

                data.forEach(prod => {
                    let cardBorder = "border-slate-200 bg-white";
                    let badge = "";

                    if (prod.isCheapest) {
                        cardBorder = "border-emerald-500 bg-emerald-50/60 ring-2 ring-emerald-400 shadow-md";
                        badge = `<span class="bg-emerald-600 text-white text-[10px] font-black uppercase px-2 py-0.5 rounded tracking-wide mb-1 inline-block">★ Lowest Price</span>`;
                    }

                    container.innerHTML += `
                        <div class="p-4 border rounded-2xl ${cardBorder} flex items-center justify-between transition">
                            <div class="flex items-center gap-4">
                                <img src="${prod.image}" class="w-16 h-16 object-contain bg-white rounded-xl border p-1" onerror="this.src='https://placehold.co/150'">
                                <div>
                                    ${badge}
                                    <h3 class="font-extrabold text-slate-900 text-lg leading-tight">${prod.store}</h3>
                                    <p class="text-xs text-slate-500 line-clamp-1 max-w-[220px] mt-0.5">${prod.name}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-2xl font-black text-slate-900">₹${prod.price}</span>
                                <p class="text-xs text-slate-400 line-through">MRP ₹${prod.mrp}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                loader.classList.add('hidden');
                container.innerHTML = `<div class="text-center text-red-500">Could not connect to backend server. Ensure server.js is running.</div>`;
            }
        }
    </script>
</body>
</html>
